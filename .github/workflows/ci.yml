name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm install

      - name: Run Style Checks (Linter)
        run: npm run lint

      - name: Run Code Formatting Checks (Prettier)
        run: npm run format:check

      - name: Run Comment Quality Enforcement Checks
        run: npm run check-comments

      - name: Compile Monorepo Workspaces
        run: npm run build:all

      - name: Run Unit Tests
        run: npm run test
